<!DOCTYPE html>
<html>
<head>
  <title>TrendMapper Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f6f9;
    }

    /* LOGIN */
    #loginPage {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 3px 10px rgba(0,0,0,0.2);
    }

    input {
      padding: 8px;
      margin: 10px;
    }

    button {
      padding: 6px 12px;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    /* DASHBOARD */
    #dashboard {
      display: none;
    }

    header {
      background: #2c3e50;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .logout-btn {
      margin-top: 10px;
      background: red;
    }

    .products {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-top: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      width: 160px;
      text-align: center;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }

    .charts {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }

    .chart-box {
      background: white;
      padding: 10px;
      border-radius: 10px;
      width: 300px;
      height: 250px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }

    .ai-box {
      text-align: center;
      margin-top: 30px;
      background: white;
      padding: 15px;
      border-radius: 10px;
      width: 60%;
      margin-left: auto;
      margin-right: auto;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }

    canvas {
      width: 100% !important;
      height: 100% !important;
    }
  </style>
</head>

<body>

<!-- LOGIN PAGE -->
<div id="loginPage">
  <div class="login-box">
    <h2>Login</h2>
    <input id="username" placeholder="Enter username"><br>
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <header>
    <h1>TrendMapper Dashboard</h1>
    <p id="userDisplay"></p>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </header>

  <!-- PRODUCTS -->
  <div class="products">
    <div class="card">
      <h3>Product 1</h3>
      <button onclick="track('view',101)">View</button>
      <button onclick="track('add_to_cart',101)">Cart</button>
    </div>

    <div class="card">
      <h3>Product 2</h3>
      <button onclick="track('view',102)">View</button>
      <button onclick="track('add_to_cart',102)">Cart</button>
    </div>
  </div>

  <!-- CHARTS -->
  <div class="charts">
    <div class="chart-box">
      <h4>Total Events</h4>
      <canvas id="totalChart"></canvas>
    </div>

    <div class="chart-box">
      <h4>Event Breakdown</h4>
      <canvas id="eventChart"></canvas>
    </div>

    <div class="chart-box">
      <h4>Top Products</h4>
      <canvas id="productChart"></canvas>
    </div>
  </div>

  <!-- AI SECTION -->
  <div class="ai-box">
    <h2>AI Insights 🤖</h2>
    <p id="aiOutput">Analyzing data...</p>
  </div>

</div>

<script>

let currentUser = null;
let totalChart, eventChart, productChart;

// LOGIN
function login() {
  const name = document.getElementById("username").value;

  if (!name) {
    alert("Enter username!");
    return;
  }

  currentUser = name;
  localStorage.setItem("user", name);

  showDashboard();
}

// SHOW DASHBOARD
function showDashboard() {
  document.getElementById("loginPage").style.display = "none";
  document.getElementById("dashboard").style.display = "block";

  document.getElementById("userDisplay").innerText = "Welcome, " + currentUser;

  loadData();
}

// LOGOUT
function logout() {
  localStorage.removeItem("user");
  location.reload();
}

// AUTO LOGIN
window.onload = function () {
  currentUser = localStorage.getItem("user");

  if (currentUser) {
    showDashboard();
  }
};

// TRACK EVENT
async function track(type, productId) {
  await fetch("http://127.0.0.1:5000/track", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      user_id: currentUser,
      event_type: type,
      product_id: productId
    })
  });

  loadData();
}

// AI LOGIC
function generateAI(data) {

  let productCount = {};

  data.forEach(e => {
    productCount[e.product_id] = (productCount[e.product_id] || 0) + 1;
  });

  let topProduct = Object.keys(productCount).reduce((a, b) =>
    productCount[a] > productCount[b] ? a : b
  );

  let message = `
    🔥 Most Popular Product: ${topProduct} <br>
    💡 Recommendation: Promote Product ${topProduct} more!
  `;

  document.getElementById("aiOutput").innerHTML = message;
}

// LOAD DATA
async function loadData() {
  const res = await fetch("http://127.0.0.1:5000/events");
  const data = await res.json();

  let total = data.length;
  let view = 0, cart = 0;
  let products = {};

  data.forEach(e => {
    if (e.event_type === "view") view++;
    if (e.event_type === "add_to_cart") cart++;

    products[e.product_id] = (products[e.product_id] || 0) + 1;
  });

  if (totalChart) totalChart.destroy();
  totalChart = new Chart(document.getElementById("totalChart"), {
    type: "bar",
    data: { labels:["Total"], datasets:[{ data:[total] }] },
    options:{ responsive:true, maintainAspectRatio:false }
  });

  if (eventChart) eventChart.destroy();
  eventChart = new Chart(document.getElementById("eventChart"), {
    type: "pie",
    data: { labels:["View","Cart"], datasets:[{ data:[view,cart] }] },
    options:{ responsive:true, maintainAspectRatio:false }
  });

  if (productChart) productChart.destroy();
  productChart = new Chart(document.getElementById("productChart"), {
    type: "bar",
    data: {
      labels:Object.keys(products),
      datasets:[{ data:Object.values(products) }]
    },
    options:{ responsive:true, maintainAspectRatio:false }
  });

  // AI CALL
  if (data.length > 0) {
    generateAI(data);
  } else {
    document.getElementById("aiOutput").innerText = "No data yet...";
  }
}

</script>

</body>
</html>
