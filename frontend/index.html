<!DOCTYPE html>
<html>
<head>
  <title>TrendMapper AI</title>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<h2 style="text-align:center;">TrendMapper AI Dashboard 🚀</h2>

<div class="products">
  <div class="card">
    <h3>Product 101</h3>
    <button onclick="track('view',101)">View</button>
    <button onclick="track('add_to_cart',101)">Add to Cart</button>
  </div>

  <div class="card">
    <h3>Product 102</h3>
    <button onclick="track('view',102)">View</button>
    <button onclick="track('add_to_cart',102)">Add to Cart</button>
  </div>

  <div class="card">
    <h3>Product 103</h3>
    <button onclick="track('view',103)">View</button>
    <button onclick="track('add_to_cart',103)">Add to Cart</button>
  </div>
</div>

<div class="charts">
  <canvas id="totalChart"></canvas>
  <canvas id="eventChart"></canvas>
  <canvas id="productChart"></canvas>
</div>

<div class="ai-box">
  <h3>AI Insights</h3>
  <p id="aiOutput"></p>
</div>

<script src="script.js"></script>

</body>
</html>
